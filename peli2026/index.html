<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karchy Cinema | Latino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; color: #e50914; }
        .movie-card:hover { transform: scale(1.05); transition: 0.3s; box-shadow: 0 0 20px rgba(229, 9, 20, 0.5); }
        .btn-latino { background: #e50914; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="p-6 bg-black flex flex-col md:flex-row justify-between items-center border-b border-zinc-800">
        <div class="logo">KARCHY <span class="text-white">CINEMA</span></div>
        <input id="search" type="text" placeholder="Buscar película..." class="bg-zinc-900 border border-zinc-700 px-6 py-2 rounded-full w-full md:w-80 outline-none focus:border-red-600 mt-4 md:mt-0">
    </nav>

    <div id="player-modal" class="fixed inset-0 bg-black/98 z-[100] hidden flex-col items-center justify-center p-4">
        <div class="w-full max-w-5xl flex justify-between items-center mb-4">
            <h2 id="video-title" class="text-2xl font-bold"></h2>
            <button onclick="closePlayer()" class="text-4xl">&times;</button>
        </div>
        
        <div class="bg-red-600/20 border border-red-600 p-3 mb-4 rounded text-sm text-center max-w-5xl w-full">
            ⚠️ <b>PARA AUDIO LATINO:</b> Haz clic en el icono de <b>Ajustes (engranaje)</b> o <b>"CC/Audio"</b> dentro del video y selecciona <b>"Spanish"</b> o <b>"Latino"</b>.
        </div>

        <div class="w-full max-w-5xl aspect-video bg-zinc-900 rounded-lg overflow-hidden shadow-2xl">
            <iframe id="video-iframe" src="" class="w-full h-full" allowfullscreen frameborder="0"></iframe>
        </div>
    </nav>

    <main class="p-8">
        <h2 class="text-xl mb-6 font-bold border-l-4 border-red-600 pl-3">Películas Sugeridas</h2>
        <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <script>
        const API_KEY = 'fd07a628a3e0f6b9a4dffb579c306fbf';
        const grid = document.getElementById('movie-grid');

        async function fetchMovies(query = '') {
            // Forzamos TMDB a que nos dé la info en Español México (Latino)
            let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=es-MX&sort_by=popularity.desc`;
            if(query) url = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=es-MX&query=${query}`;

            const res = await fetch(url);
            const data = await res.json();
            
            grid.innerHTML = data.results.map(m => m.poster_path ? `
                <div class="movie-card bg-zinc-900 rounded-lg overflow-hidden cursor-pointer" onclick="openPlayer(${m.id}, '${m.title}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-auto">
                    <div class="p-2 text-xs font-bold truncate text-center">${m.title}</div>
                </div>
            ` : '').join('');
        }

        function openPlayer(id, title) {
            document.getElementById('video-title').innerText = title;
            // Usamos vidsrc.pro que suele tener mejores opciones de pistas de audio
            document.getElementById('video-iframe').src = `https://vidsrc.pro/embed/movie/${id}`;
            document.getElementById('player-modal').classList.replace('hidden', 'flex');
        }

        function closePlayer() {
            document.getElementById('video-iframe').src = '';
            document.getElementById('player-modal').classList.replace('flex', 'hidden');
        }

        document.getElementById('search').addEventListener('input', (e) => fetchMovies(e.target.value));
        fetchMovies();
    </script>
</body>
</html>
