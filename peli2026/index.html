<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karchy Cinema | Premium Latino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --karchy-red: #e50914; --karchy-dark: #020202; }
        body { background: var(--karchy-dark); color: white; font-family: 'Inter', sans-serif; margin:0; overflow-x: hidden; }
        nav { background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); backdrop-filter: blur(10px); z-index: 100; }
        
        .hero-banner { height: 70vh; background-size: cover; background-position: center; display: flex; align-items: center; position: relative; }
        .hero-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--karchy-dark), transparent); }
        
        .karchy-card { cursor: pointer; transition: 0.3s; border-radius: 12px; overflow: hidden; background: #111; aspect-ratio: 2/3; position: relative; }
        .karchy-card:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }
        
        .search-input { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 8px 15px; 
            border-radius: 20px; 
            outline: none; 
            color: white; 
            transition: width 0.3s ease;
        }

        .kids-active { background: #004d7a !important; }
        
        #menuPerfiles { 
            display: none; 
            position: absolute; 
            top: 70px; 
            right: 20px; 
            background: #111; 
            border: 1px solid #333; 
            border-radius: 15px; 
            padding: 20px; 
            z-index: 1000; 
        }
        
        .perfil-item { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-radius: 8px; }
        .perfil-item:hover { background: #222; }
        
        .btn-servidor { 
            background: #222; 
            color: #aaa; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 10px; 
            font-weight: bold; 
            transition: 0.2s; 
            border: 1px solid transparent; 
        }
        .btn-servidor.active { background: var(--karchy-red); color: white; border-color: rgba(255,255,255,0.3); }
        
        iframe { background: black; }

        /* Keyframes para animaciones que tenías */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }

        /* Ajustes Responsivos Críticos */
        @media (max-width: 640px) {
            .hero-banner { height: 55vh; }
            #heroTitle { font-size: 2.2rem !important; }
            .search-input { width: 100px; font-size: 10px; }
            .search-input:focus { width: 140px; }
            nav { padding: 1rem 0.5rem; }
        }
    </style>
</head>
<body id="mainBody">

    <nav id="navbar" class="fixed w-full p-4 lg:px-12 flex justify-between items-center transition-all">
        <div class="flex items-center gap-4 md:gap-6">
            <h1 class="text-xl md:text-2xl font-black text-red-600 tracking-tighter cursor-pointer" onclick="location.reload()">KARCHY</h1>
            <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-widest">
                <a href="#" onclick="cambiarSeccion('trending/all/day', 'Inicio')" class="hover:text-red-500">Inicio</a>
                <a href="#" onclick="cambiarSeccion('discover/movie', 'Películas')">Películas</a>
                <a href="#" onclick="cambiarSeccion('tv/popular', 'Series')">Series</a>
            </div>
        </div>
        
        <div class="flex items-center gap-2 md:gap-4">
            <input type="text" id="mainSearch" placeholder="Buscar..." class="search-input">
            
            <button onclick="toggleKids()" id="btnKids" class="bg-blue-600 px-3 md:px-4 py-1.5 rounded-full text-[9px] md:text-[10px] font-black border border-white/10 shrink-0">KIDS</button>
            
            <div onclick="toggleMenuPerfiles()" class="w-9 h-9 md:w-10 md:h-10 rounded-lg bg-red-600 flex items-center justify-center font-black cursor-pointer shadow-lg border-2 border-white/20 shrink-0">K</div>
            
            <div id="menuPerfiles">
                <div id="contenedorPerfiles"></div>
            </div>
        </div>
    </nav>

    <header id="hero" class="hero-banner">
        <div class="relative z-10 px-8 lg:px-20 max-w-4xl pt-20">
            <h1 id="heroTitle" class="text-5xl lg:text-7xl font-black italic uppercase leading-tight mb-4">KARCHY CINEMA</h1>
            <p id="heroDesc" class="text-zinc-400 text-sm mb-8 line-clamp-3 max-w-xl"></p>
            <button id="heroBtn" class="bg-red-600 px-10 py-3 rounded-md font-black hover:bg-white hover:text-red-600 transition flex items-center gap-3">
                <i class="fa fa-play"></i> REPRODUCIR AHORA
            </button>
        </div>
    </header>

    <main class="p-8 lg:px-20">
        <h2 id="sectionTitle" class="text-xl font-black uppercase tracking-widest mb-10 border-l-4 border-red-600 pl-4">Recomendados para ti</h2>
        
        <div id="gridPeliculas" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>

        <div id="loading" class="py-20 text-center hidden">
            <i class="fa fa-circle-notch fa-spin text-red-600 text-4xl"></i>
        </div>
    </main>

    <div id="player" class="fixed inset-0 z-[200] bg-black hidden flex flex-col">
        <div class="p-3 flex flex-wrap justify-between items-center bg-[#0a0a0a] border-b border-white/5 gap-2">
            <div class="flex items-center gap-4">
                <span class="font-black text-red-600 hidden sm:inline">KARCHY PLAYER</span>
                <div id="controlesPlayer" class="flex gap-2">
                    <button onclick="cambiarMotor(1)" id="btnM1" class="btn-servidor active">LATINO 1</button>
                    <button onclick="cambiarMotor(2)" id="btnM2" class="btn-servidor">LATINO 2</button>
                    <button onclick="cambiarMotor(3)" id="btnM3" class="btn-servidor">ESTÁNDAR (Multi)</button>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-[9px] text-green-500 font-bold uppercase animate-pulse">
                    <i class="fa fa-check"></i> Auto-idioma: ES-LATAM
                </span>
                <button onclick="cerrarPlayer()" class="bg-white/10 hover:bg-red-600 text-white px-5 py-1.5 rounded-full text-[10px] font-black transition">SALIR</button>
            </div>
        </div>
        <div class="flex-1 bg-black">
            <iframe id="videoIframe" src="" class="w-full h-full border-0" allowfullscreen></iframe>
        </div>
    </div>

    <div id="modalDetalles" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/95">
        <div class="w-full max-w-4xl max-h-[90vh] rounded-3xl overflow-hidden flex flex-col md:flex-row bg-[#111]">
            <div id="modalImg" class="w-full md:w-1/3 bg-cover bg-center min-h-[300px]"></div>
            <div class="p-8 flex-1 overflow-y-auto">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="modalTitle" class="text-3xl font-black italic uppercase">Título</h2>
                    <button onclick="cerrarModal()" class="text-3xl text-zinc-600">&times;</button>
                </div>
                
                <div id="contSeries" class="hidden">
                    <p class="text-xs text-red-500 font-bold mb-2">SELECCIONA EPISODIO:</p>
                    <div id="listaTemps" class="flex gap-2 overflow-x-auto mb-4 pb-2"></div>
                    <div id="listaEps" class="space-y-1 max-h-[200px] overflow-y-auto pr-2"></div>
                </div>

                <button id="btnPeli" class="bg-red-600 w-full py-4 rounded-xl font-black hidden hover:bg-red-700 transition">
                    REPRODUCIR PELÍCULA
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'fd07a628a3e0f6b9a4dffb579c306fbf';
        let currentMedia = { id: null, tipo: null, s: 1, e: 1 };
        let isKids = false;

        window.onload = () => { 
            renderPerfiles(); 
            cargarHero(); 
            cambiarSeccion('trending/all/day', 'Inicio'); 
        };

        // Función de Motores Actualizada para forzar Audio Español
        function cambiarMotor(num) {
            const { id, tipo, s, e } = currentMedia;
            let url = "";
            
            // Actualizar UI de botones
            [1,2,3].forEach(n => {
                const btn = document.getElementById(`btnM${n}`);
                if(btn) btn.classList.remove('active');
            });
            document.getElementById(`btnM${num}`).classList.add('active');

            // Configuración de URLs con parámetros de idioma forzados
            if(num === 1) {
                url = tipo === 'movie' 
                    ? `https://vidsrc.cc/v2/embed/movie/${id}?auto_lang=es&lang=es` 
                    : `https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}?auto_lang=es&lang=es`;
            } else if (num === 2) {
                url = tipo === 'movie'
                    ? `https://vidsrc.xyz/embed/movie?tmdb=${id}&lang=es&audio_lang=es`
                    : `https://vidsrc.xyz/embed/tv?tmdb=${id}&sea=${s}&epi=${e}&lang=es&audio_lang=es`;
            } else {
                url = tipo === 'movie'
                    ? `https://vidsrc.me/embed/movie?tmdb=${id}&lang=es`
                    : `https://vidsrc.me/embed/tv?tmdb=${id}&sea=${s}&epi=${e}&lang=es`;
            }

            document.getElementById('videoIframe').src = url;
        }

        function lanzar(id, tipo, s = 1, e = 1) {
            currentMedia = { id, tipo, s, e };
            document.getElementById('player').classList.remove('hidden');
            cambiarMotor(1); 
        }

        async function cargarHero() {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=es-MX`);
                const data = await res.json();
                const p = data.results[0];
                if(p) {
                    document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${p.backdrop_path})`;
                    document.getElementById('heroTitle').innerText = p.title || p.name;
                    document.getElementById('heroDesc').innerText = p.overview;
                    document.getElementById('heroBtn').onclick = () => abrirDetalles(p.id, p.media_type);
                }
            } catch(e) { console.error("Error hero:", e); }
        }

        async function cambiarSeccion(path, label) {
            try {
                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('sectionTitle').innerText = label;
                const res = await fetch(`https://api.themoviedb.org/3/${path}?api_key=${API_KEY}&language=es-MX&page=1`);
                const data = await res.json();
                renderGrid(data.results);
                document.getElementById('loading').classList.add('hidden');
            } catch(e) { console.error("Error sección:", e); }
        }

        function renderGrid(lista) {
            const grid = document.getElementById('gridPeliculas');
            grid.innerHTML = "";
            lista.forEach(p => {
                if(!p.poster_path) return;
                const card = document.createElement('div');
                card.className = "karchy-card animate-fade-in";
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${p.poster_path}" class="w-full h-full object-cover" loading="lazy">`;
                card.onclick = () => abrirDetalles(p.id, p.media_type || (p.first_air_date ? 'tv' : 'movie'));
                grid.appendChild(card);
            });
        }

        async function abrirDetalles(id, tipo) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/${tipo}/${id}?api_key=${API_KEY}&language=es-MX`);
                const p = await res.json();
                document.getElementById('modalTitle').innerText = p.title || p.name;
                document.getElementById('modalImg').style.backgroundImage = `url(https://image.tmdb.org/t/p/w500${p.poster_path})`;
                
                if(tipo === 'movie') {
                    document.getElementById('btnPeli').classList.remove('hidden');
                    document.getElementById('contSeries').classList.add('hidden');
                    document.getElementById('btnPeli').onclick = () => lanzar(id, 'movie');
                } else {
                    document.getElementById('btnPeli').classList.add('hidden');
                    document.getElementById('contSeries').classList.remove('hidden');
                    renderTemps(id, p.number_of_seasons);
                }
                document.getElementById('modalDetalles').classList.remove('hidden');
            } catch(e) { console.error("Error detalles:", e); }
        }

        async function renderTemps(id, n) {
            const div = document.getElementById('listaTemps'); 
            div.innerHTML = "";
            for(let i=1; i<=n; i++) {
                const b = document.createElement('button');
                b.className = "px-4 py-1 bg-zinc-800 rounded text-[10px] font-bold shrink-0 hover:bg-red-600 transition";
                b.innerText = `T${i}`;
                b.onclick = () => renderEps(id, i);
                div.appendChild(b);
            }
            renderEps(id, 1);
        }

        async function renderEps(id, s) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${API_KEY}&language=es-MX`);
                const data = await res.json();
                const div = document.getElementById('listaEps'); 
                div.innerHTML = "";
                data.episodes.forEach(e => {
                    const row = document.createElement('div');
                    row.className = "p-3 flex justify-between items-center cursor-pointer hover:bg-white/5 rounded border-b border-white/5";
                    row.innerHTML = `<span class="text-xs">${e.episode_number}. ${e.name}</span><i class="fa fa-play text-red-600"></i>`;
                    row.onclick = () => lanzar(id, 'tv', s, e.episode_number);
                    div.appendChild(row);
                });
            } catch(e) { console.error("Error eps:", e); }
        }

        function toggleKids() {
            if(!isKids) {
                isKids = true;
                document.getElementById('mainBody').classList.add('kids-active');
                document.getElementById('btnKids').innerText = "ADULTO";
                cambiarSeccion('discover/movie?with_genres=16,10751', 'Zona Kids');
            } else {
                if(prompt("PIN Parental (2818):") === "2818") {
                    isKids = false;
                    document.getElementById('mainBody').classList.remove('kids-active');
                    document.getElementById('btnKids').innerText = "KIDS";
                    cambiarSeccion('trending/all/day', 'Inicio');
                }
            }
        }

        function renderPerfiles() {
            const container = document.getElementById('contenedorPerfiles'); 
            container.innerHTML = "";
            const pers = [{ n: "Karchy", c: "bg-red-600" }, { n: "Kids", c: "bg-blue-500" }];
            pers.forEach(p => {
                const d = document.createElement('div');
                d.className = "perfil-item";
                d.innerHTML = `<div class="w-8 h-8 rounded ${p.c}"></div><span class="text-sm font-bold">${p.n}</span>`;
                d.onclick = () => { 
                    if(p.n === "Kids") toggleKids(); 
                    document.getElementById('menuPerfiles').style.display='none'; 
                };
                container.appendChild(d);
            });
        }

        function toggleMenuPerfiles() {
            const m = document.getElementById('menuPerfiles');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function cerrarModal() { document.getElementById('modalDetalles').classList.add('hidden'); }
        
        function cerrarPlayer() { 
            document.getElementById('player').classList.add('hidden'); 
            document.getElementById('videoIframe').src = ""; 
        }
        
        document.getElementById('mainSearch').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const q = e.target.value;
                if(!q) return;
                const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}&language=es-MX`);
                const data = await res.json();
                renderGrid(data.results);
                document.getElementById('sectionTitle').innerText = `Resultados: ${q}`;
            }
        });

        // Cerrar menú de perfiles si se hace clic fuera
        window.onclick = function(event) {
            if (!event.target.matches('.w-9, .w-10, .bg-red-600')) {
                const m = document.getElementById('menuPerfiles');
                if (m && m.style.display === 'block') m.style.display = 'none';
            }
        }
    </script>
</body>
</html>
