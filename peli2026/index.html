<!DOCTYPE html>
<html lang="es">
<head>
  <title>Karchy Cinema | Fusión Completa Vercel</title>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <link rel="shortcut icon" href="facon.ico.png" type="image/x-icon">
  <link rel="stylesheet" href="../karchy-css/w3.css">
  <link rel="stylesheet" href="../karchy-css/material-icons.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script type="text/javascript" src="../js/jquery.min.jsx"></script>

  <style>
    /* RESTAURACIÓN DE ESTILOS ORIGINALES KARCHY */
    body {
      font-family: "Raleway", sans-serif;
      font-size: 20px;
      background-color: #262626;
      color: white;
      -webkit-user-select: none;
      margin: 0;
    }

    .material-icons { vertical-align: -25%; font-size: 30px; }
    .w3-logo { height: 60px; transition: 0.3s; }

    /* Efectos de Texto y Sombras de tu código original */
    .w3-text-shadow {
      text-shadow: 0px 1px 2px rgba(0, 0, 0, 1), 0px 1px 2px rgba(0, 0, 0, 1), 0px 1px 2px rgba(0, 0, 0, 1);
    }

    /* Hero Banner Dinámico */
    .w3-background-index {
      width: 100%;
      height: 700px;
      z-index: -1;
      margin-top: -75px;
      position: absolute;
      background-size: cover;
      background-position: center center;
      box-shadow: 0px -100px 100px 20px rgba(0, 0, 0, 0.8) inset;
    }

    .w3-btn-play-portada {
      margin-bottom: 50px;
      color: white !important;
      background-color: black;
      font-size: 20px;
      width: 250px;
      border: 2px solid transparent !important;
      transition: 0.3s;
    }
    .w3-btn-play-portada:hover { background-color: #cd6a33 !important; border-color: #cd6a33 !important; }

    /* Grid de Items */
    .w3-items div { border: 3px solid transparent !important; border-radius: 4px; transition: 0.3s; }
    a.w3-items:hover { transform: scale(1.1); }
    a.w3-items:hover div { border: 3px solid #cd6a33 !important; }

    /* INTEGRACIÓN RUEDITA DE AUDIO (Cerebro Copy-Peli) */
    .audio-settings-panel {
        background: rgba(0, 0, 0, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px; padding: 15px; display: none;
        position: absolute; bottom: 85px; right: 20px; z-index: 500; width: 260px;
        box-shadow: 0 10px 40px rgba(0,0,0,1); backdrop-filter: blur(10px);
    }
    .audio-option {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px; margin: 5px 0; border-radius: 8px;
        cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .audio-option.active { background: #e50914; color: white; }
    .gear-btn { font-size: 32px; color: white; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 5px black); }
    .gear-btn:hover { transform: rotate(90deg); color: #cd6a33; }

    /* Player Container */
    #playerContainer { position: fixed; inset: 0; background: black; z-index: 9999; display: none; flex-direction: column; }
    
    /* Modo Kids */
    .kids-active { background-color: #003049 !important; }
    .kids-active #barscroll { background-color: #00507a !important; }
  </style>
</head>

<body id="mainBody">

  <div class="w3-top">
    <div id="barscroll" class="w3-bar w3-black w3-xlarge w3-padding" style="height:75px; background-color: rgba(0, 0, 0, 0)!important; transition: 0.5s;">
      <div class="w3-left">
        <a class="w3-btn-back" href="javascript:location.reload();">
          <i class="material-icons" style="font-size: 40px;">&#xe5cb;</i>
        </a>
        <img class="w3-logo" src="http://cine.lgcomunicaciones.com/images/Default.png">
      </div>
      <div class="w3-right">
        <button onclick="toggleKids()" class="w3-button w3-blue w3-round-large w3-small" style="margin-top:10px;">KIDS MODE</button>
        <a id="Openmenu" href="javascript:void(0)" class="w3-button">
          Menú <i class="material-icons">&#xe5d2;</i>
        </a>
      </div>
    </div>
  </div>

  <div class="w3-sidebar w3-bar-block w3-animate-right w3-light-grey" style="display:none;right:0;top:0;z-index:1000;" id="Menu">
    <button onclick="cerrarMenu()" class="w3-button w3-large w3-block w3-red">&times; CERRAR</button>
    <a href="#" onclick="cargarSeccion('trending/all/day', 'Inicio')" class="w3-bar-item w3-button">Inicio</a>
    <a href="#" onclick="cargarSeccion('movie/popular', 'Películas')" class="w3-bar-item w3-button">Películas</a>
    <a href="#" onclick="cargarSeccion('tv/popular', 'Series')" class="w3-bar-item w3-button">Series</a>
    <a href="#" onclick="toggleKids()" class="w3-bar-item w3-button">Kids</a>
  </div>

  <div id="heroSection">
    <div id="heroBg" class="w3-hide-small w3-background-index"></div>
    <div class="w3-item-principal w3-hide-small">
      <div class="w3-row w3-text-white w3-text-shadow w3-padding" style="height: 500px; max-width:1500px; margin: auto; display: flex; align-items: flex-end;">
        <div style="padding-bottom: 50px;">
          <h1 id="heroTitle" class="w3-xxxlarge" style="font-weight: 900; margin-bottom: 10px;">Cargando...</h1>
          <p id="heroDesc" class="w3-large" style="max-width: 600px; margin-bottom: 20px;">...</p>
          <button id="heroPlayBtn" class="w3-btn w3-border w3-round-large w3-btn-play-portada">
            <i class="material-icons" style="vertical-align: -30%; font-size: 35px;">&#xE037;</i> VER AHORA
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="Contenido" class="w3-row" style="margin-top:20px; margin-left:10px; margin-right:10px;">
    <h3 id="sectionTitle" class="w3-title w3-text-white w3-margin-left" style="font-weight: bold; border-left: 6px solid #cd6a33; padding-left: 15px;">TENDENCIAS</h3>
    <div id="gridPeliculas" class="w3-row-padding w3-margin-top">
      </div>
  </div>

  <div id="playerContainer">
    <div class="w3-bar w3-black w3-padding">
        <span id="pStatus" class="w3-bar-item w3-text-orange w3-small" style="font-weight: bold;">CONECTANDO...</span>
        <button onclick="cerrarPlayer()" class="w3-button w3-right w3-red w3-round">CERRAR</button>
    </div>
    <div style="flex:1; position: relative;">
        <iframe id="videoIframe" src="" style="width:100%; height:100%; border:0;" allowfullscreen></iframe>
        
        <div style="position: absolute; bottom: 40px; right: 40px; z-index: 10001;">
            <div id="audioPanel" class="audio-settings-panel">
                <p style="font-size: 11px; color: #cd6a33; font-weight: 900; margin-bottom: 10px;">CONFIGURACIÓN DE AUDIO</p>
                <div class="audio-option active" id="opt1" onclick="cambiarMotor(1)">
                    <span>Latino Principal</span><i class="fa fa-check-circle"></i>
                </div>
                <div class="audio-option" id="opt2" onclick="cambiarMotor(2)">
                    <span>Latino Alternativo</span><i class="fa fa-circle"></i>
                </div>
                <div class="audio-option" id="opt3" onclick="cambiarMotor(3)">
                    <span>Idioma Original</span><i class="fa fa-globe"></i>
                </div>
            </div>
            <i class="fa fa-gear gear-btn" onclick="toggleAudioPanel()"></i>
        </div>
    </div>
  </div>

  <script>
    const API_KEY = 'fd07a628a3e0f6b9a4dffb579c306fbf';
    let currentMedia = { id: null, tipo: null, s: 1, e: 1 };
    let isKids = false;

    $(document).ready(function() {
        initApp();
        
        // Efecto Scroll de tu código original
        window.onscroll = function() {
            let scroll = document.documentElement.scrollTop || document.body.scrollTop;
            let u = document.getElementById("barscroll");
            if (scroll > 50) {
                u.style.backgroundColor = "rgba(0, 0, 0, 0.95)";
                u.style.boxShadow = "0px 0px 20px 0px #000";
            } else {
                u.style.backgroundColor = "rgba(0, 0, 0, 0)";
                u.style.boxShadow = "none";
            }
        };
    });

    async function initApp() {
        // Cargar Portada (Hero)
        const resHero = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=es-MX`);
        const dataHero = await resHero.json();
        const main = dataHero.results[0];
        
        document.getElementById('heroBg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${main.backdrop_path})`;
        document.getElementById('heroTitle').innerText = main.title || main.name;
        document.getElementById('heroDesc').innerText = main.overview;
        document.getElementById('heroPlayBtn').onclick = () => abrirPlayer(main.id, main.media_type);

        cargarSeccion('trending/all/day', 'Tendencias de Hoy');
    }

    async function cargarSeccion(path, titulo) {
        document.getElementById('sectionTitle').innerText = titulo.toUpperCase();
        const res = await fetch(`https://api.themoviedb.org/3/${path}${path.includes('?') ? '&' : '?'}api_key=${API_KEY}&language=es-MX`);
        const data = await res.json();
        const grid = document.getElementById('gridPeliculas');
        grid.innerHTML = "";
        
        data.results.forEach(p => {
            if(!p.poster_path) return;
            const card = `
                <a href="javascript:void(0)" onclick="abrirPlayer(${p.id}, '${p.media_type || 'movie'}')" class="w3-col l2 m3 s6 w3-center w3-items w3-margin-bottom">
                    <div><img src="https://image.tmdb.org/t/p/w500${p.poster_path}" style="width:100%;"></div>
                </a>`;
            grid.innerHTML += card;
        });
        cerrarMenu();
    }

    function abrirPlayer(id, tipo) {
        currentMedia = { id, tipo, s: 1, e: 1 };
        document.getElementById('playerContainer').style.display = 'flex';
        cambiarMotor(1);
    }

    function cambiarMotor(num) {
        const { id, tipo, s, e } = currentMedia;
        let url = "";
        $(".audio-option").removeClass("active");
        $(`#opt${num}`).addClass("active");

        // Lógica de servidores optimizada para Vercel
        if(num === 1) {
            url = `https://vidsrc.cc/v2/embed/${tipo}/${id}?auto_lang=es`;
            $("#pStatus").text("MODO: LATINO PREMIUM");
        } else if(num === 2) {
            url = `https://vidsrc.xyz/embed/${tipo}?tmdb=${id}&lang=es`;
            $("#pStatus").text("MODO: LATINO ALT");
        } else {
            url = `https://vidsrc.me/embed/${tipo}?tmdb=${id}`;
            $("#pStatus").text("MODO: ORIGINAL");
        }

        document.getElementById('videoIframe').src = url;
        $("#audioPanel").hide();
    }

    function toggleAudioPanel() { $("#audioPanel").fadeToggle(200); }
    function cerrarPlayer() { 
        $("#playerContainer").hide(); 
        document.getElementById('videoIframe').src = ""; 
    }

    function toggleKids() {
        if(isKids) {
            if(prompt("PIN Parental (2818):") === "2818") {
                isKids = false;
                $("#mainBody").removeClass("kids-active");
                cargarSeccion('trending/all/day', 'Tendencias');
            }
        } else {
            isKids = true;
            $("#mainBody").addClass("kids-active");
            cargarSeccion('discover/movie?with_genres=16,10751', 'Zona Niños');
        }
    }

    // Funciones del Menú Lateral
    document.getElementById("Openmenu").onclick = () => $("#Menu").show();
    function cerrarMenu() { $("#Menu").hide(); }
  </script>

</body>
</html>
