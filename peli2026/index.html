<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karchy Cinema | Tu Cine en Casa Gratis</title>
    <meta name="description" content="Disfruta de las mejores películas y series en Karchy Cinema.">
    <link rel="icon" type="image/png" href="karchy imagen.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --karchy-red: #e50914; --karchy-dark: #020202; }
        body { background: var(--karchy-dark); color: white; font-family: 'Inter', sans-serif; margin:0; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Scrollbar Estilo Premium */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: var(--karchy-red); border-radius: 10px; }

        nav { background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); backdrop-filter: blur(10px); z-index: 100; transition: 0.3s; height: 70px; }
        .nav-active { background: rgba(0,0,0,0.95); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .hero-banner { height: 85vh; background-size: cover; background-position: center; display: flex; align-items: center; position: relative; transition: 0.5s; }
        .hero-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--karchy-dark) 5%, transparent 95%); }
        
        .karchy-card { cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 12px; overflow: hidden; background: #111; aspect-ratio: 2/3; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .karchy-card:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(229, 9, 20, 0.4); z-index: 10; border-color: var(--karchy-red); }
        
        /* Buscador Adaptable */
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-input { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            padding: 8px 12px 8px 35px; border-radius: 20px; outline: none; transition: 0.3s; 
            width: 35px; color: transparent; cursor: pointer;
        }
        .search-input:focus, .search-input:not(:placeholder-shown) { 
            width: 220px; color: white; cursor: text; background: rgba(0,0,0,0.9); border-color: var(--karchy-red);
        }
        .search-icon-fixed { position: absolute; left: 12px; pointer-events: none; font-size: 14px; color: #aaa; }

        #menuPerfiles { display: none; position: absolute; top: 65px; right: 20px; background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; width: 280px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 1000; }
        .avatar { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; }
        
        .server-btn { background: #1a1a1a; padding: 12px 24px; border-radius: 12px; font-size: 11px; font-weight: 900; border: 1px solid #333; transition: 0.3s; color: #ccc; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .server-btn.active { background: var(--karchy-red); border-color: white; color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4); }

        /* Contenedor de Video Mejorado */
        .video-container { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        @media (max-width: 768px) {
            .nav-links-container { gap: 10px !important; font-size: 9px !important; }
            .search-input:focus { width: 140px; }
            .hero-banner h1 { font-size: 3rem !important; }
            .server-btn { padding: 8px 12px; font-size: 9px; }
        }
    </style>
</head>
<body id="mainBody">

    <nav id="navbar" class="fixed w-full p-4 lg:px-12 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center gap-4 lg:gap-8">
            <h1 class="text-2xl lg:text-3xl font-black text-red-600 tracking-tighter cursor-pointer" onclick="location.reload()">KARCHY</h1>
            <div class="nav-links-container flex gap-4 text-[10px] font-black uppercase tracking-widest">
                <a href="#" onclick="cambiarSeccion('trending/all/day', 'Inicio')" class="hover:text-red-600 transition">Inicio</a>
                <a href="#" onclick="cambiarSeccion('discover/movie', 'Películas')" class="hover:text-red-600 transition">Películas</a>
                <a href="#" onclick="cambiarSeccion('tv/popular', 'Series')" class="hover:text-red-600 transition">Series</a>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="search-wrapper">
                <i class="fa fa-search search-icon-fixed"></i>
                <input type="text" id="mainSearch" placeholder=" " class="search-input">
            </div>

            <button onclick="toggleKids()" id="btnKids" class="bg-zinc-800 px-3 py-2 rounded-full text-[9px] font-black border border-white/10 hover:bg-yellow-500 hover:text-black transition">KIDS</button>
            <div onclick="toggleMenuPerfiles()" id="userMainBtn" class="w-9 h-9 rounded-lg bg-red-600 flex items-center justify-center font-black cursor-pointer border-2 border-white/20">K</div>
            
            <div id="menuPerfiles">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-4 text-center">Perfiles</p>
                <div id="contenedorPerfiles"></div>
                <hr class="my-4 border-white/5">
                <button onclick="borrarHistorial()" class="w-full text-[10px] font-bold text-zinc-400 hover:text-red-500 transition">Limpiar Historial</button>
            </div>
        </div>
    </nav>

    <header id="hero" class="hero-banner">
        <div class="relative z-10 px-8 lg:px-20 max-w-4xl pt-20">
            <div class="flex items-center gap-3 mb-4 text-xs font-bold">
                <span class="bg-red-600 px-2 py-1 rounded">MÁS VISTO</span>
                <span id="heroYear" class="text-zinc-400">2026</span>
            </div>
            <h1 id="heroTitle" class="text-5xl lg:text-8xl font-black italic uppercase leading-none mb-6 text-white">Cargando...</h1>
            <p id="heroDesc" class="text-zinc-300 text-sm lg:text-lg mb-8 line-clamp-3 font-light max-w-2xl leading-relaxed"></p>
            <div class="flex flex-wrap gap-4">
                <button id="heroBtn" class="bg-red-600 px-8 py-4 rounded-md font-black hover:bg-white hover:text-red-600 transition flex items-center gap-3 shadow-xl">
                    <i class="fa fa-play"></i> REPRODUCIR
                </button>
                <button onclick="sorpresa()" class="bg-white/10 backdrop-blur-md px-8 py-4 rounded-md font-bold hover:bg-white/20 transition flex items-center gap-3">
                    <i class="fa fa-shuffle"></i> ¿QUÉ VEMOS?
                </button>
            </div>
        </div>
    </header>

    <main class="p-8 lg:px-20 relative z-20">
        <div id="historialSection" class="hidden mb-12">
            <h2 class="text-lg font-black uppercase tracking-widest mb-6 border-l-4 border-blue-500 pl-4">Continuar viendo</h2>
            <div id="gridHistorial" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </div>

        <h2 id="sectionTitle" class="text-lg font-black uppercase tracking-widest mb-10 border-l-4 border-red-600 pl-4">Tendencias</h2>
        <div id="gridPeliculas" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        <div id="loading" class="py-20 text-center hidden"><i class="fa fa-circle-notch fa-spin text-red-600 text-4xl"></i></div>
    </main>

    <div id="modalDetalles" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
        <div class="w-full max-w-5xl max-h-[90vh] rounded-3xl overflow-hidden flex flex-col lg:flex-row bg-[#0d0d0d] border border-white/5">
             <div id="modalImg" class="w-full lg:w-2/5 bg-cover bg-center min-h-[350px]"></div>
             <div class="p-8 lg:p-10 flex-1 overflow-y-auto">
                 <div class="flex justify-between items-start mb-6">
                     <h2 id="modalTitle" class="text-3xl lg:text-4xl font-black uppercase italic text-white">Título</h2>
                     <button onclick="cerrarModal()" class="text-4xl text-zinc-600 hover:text-red-600 transition">&times;</button>
                 </div>
                 <p id="modalPlot" class="text-zinc-400 text-sm mb-8 leading-relaxed"></p>
                 <div id="contSeries" class="hidden">
                     <div id="listaTemps" class="flex gap-2 overflow-x-auto mb-6 pb-2"></div>
                     <div id="listaEps" class="space-y-1 max-h-[200px] overflow-y-auto pr-2"></div>
                 </div>
                 <button id="btnPeli" class="bg-red-600 w-full py-5 rounded-xl font-black hidden hover:bg-white hover:text-red-600 transition uppercase tracking-widest">Ver Ahora</button>
             </div>
        </div>
    </div>

    <div id="player" class="fixed inset-0 z-[200] bg-black hidden flex flex-col">
        <div class="p-4 flex flex-wrap justify-between items-center bg-[#050505] border-b border-white/10 gap-4">
            <div class="flex items-center gap-6">
                <span class="font-black text-red-600 text-xl tracking-tighter">KARCHY</span>
                <div id="selectorServidores" class="flex gap-2"></div>
            </div>
            <div class="flex items-center gap-4">
                <span class="hidden md:block text-[10px] text-zinc-500 font-bold uppercase">Modo Cine Activado</span>
                <button onclick="cerrarPlayer()" class="bg-zinc-800 hover:bg-red-600 text-white px-6 py-2 rounded-full text-[10px] font-black transition">SALIR</button>
            </div>
        </div>
        <div class="flex-1 video-container">
            <iframe id="videoIframe" src="" class="w-full h-full border-0" 
                    allowfullscreen allow="autoplay; encrypted-media" 
                    sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts"></iframe>
        </div>
    </div>

    <script>
        const API_KEY = 'fd07a628a3e0f6b9a4dffb579c306fbf';
        let currentMedia = { id: null, tipo: null, s: 1, e: 1, name: "", poster: "" };
        let isKids = false;
        let currentPage = 1;
        let currentPath = 'trending/all/day';
        let isFetching = false;

        window.onload = () => { renderPerfiles(); cargarHero(); cambiarSeccion('trending/all/day', 'Tendencias de Hoy'); actualizarHistorial(); };

        // --- SISTEMA DE DATOS ---
        function guardarEnHistorial(media) {
            let hist = JSON.parse(localStorage.getItem('karchy_historial') || '[]');
            hist = hist.filter(item => item.id !== media.id);
            hist.unshift(media);
            localStorage.setItem('karchy_historial', JSON.stringify(hist.slice(0, 10)));
            actualizarHistorial();
        }

        function actualizarHistorial() {
            const hist = JSON.parse(localStorage.getItem('karchy_historial') || '[]');
            const grid = document.getElementById('gridHistorial');
            const section = document.getElementById('historialSection');
            if(hist.length > 0) {
                section.classList.remove('hidden');
                grid.innerHTML = "";
                hist.forEach(p => {
                    const card = document.createElement('div');
                    card.className = "karchy-card";
                    card.innerHTML = `<img src="https://image.tmdb.org/t/p/w300${p.poster}" alt="${p.name}" class="w-full h-full object-cover">`;
                    card.onclick = () => abrirDetalles(p.id, p.tipo);
                    grid.appendChild(card);
                });
            } else { section.classList.add('hidden'); }
        }

        function borrarHistorial() { localStorage.removeItem('karchy_historial'); actualizarHistorial(); }

        // --- NAVEGACIÓN ---
        async function cambiarSeccion(path, label) {
            currentPath = path;
            currentPage = 1;
            document.getElementById('sectionTitle').innerText = label;
            document.getElementById('gridPeliculas').innerHTML = "";
            cargarContenido();
        }

        async function cargarContenido() {
            if(isFetching) return;
            isFetching = true;
            document.getElementById('loading').classList.remove('hidden');
            const url = `https://api.themoviedb.org/3/${currentPath}${currentPath.includes('?') ? '&' : '?'}api_key=${API_KEY}&language=es-MX&page=${currentPage}`;
            const res = await fetch(url);
            const data = await res.json();
            renderGrid(data.results, true);
            isFetching = false;
            document.getElementById('loading').classList.add('hidden');
        }

        function renderGrid(lista, append) {
            const grid = document.getElementById('gridPeliculas');
            if(!append) grid.innerHTML = "";
            lista.forEach(p => {
                if(!p.poster_path) return;
                const card = document.createElement('div');
                card.className = "karchy-card animate-fade-in";
                // Usamos w300 para mayor velocidad que LG
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w300${p.poster_path}" loading="lazy" class="w-full h-full object-cover">`;
                card.onclick = () => abrirDetalles(p.id, p.media_type || (p.first_air_date ? 'tv' : 'movie'));
                grid.appendChild(card);
            });
        }

        // --- DETALLES Y PLAYER ---
        async function abrirDetalles(id, tipo) {
            const res = await fetch(`https://api.themoviedb.org/3/${tipo}/${id}?api_key=${API_KEY}&language=es-MX`);
            const p = await res.json();
            currentMedia = { id, tipo, s: 1, e: 1, name: p.title || p.name, poster: p.poster_path };
            
            document.getElementById('modalTitle').innerText = currentMedia.name;
            document.getElementById('modalPlot').innerText = p.overview || "Sin descripción disponible en este momento.";
            document.getElementById('modalImg').style.backgroundImage = `url(https://image.tmdb.org/t/p/w500${p.poster_path})`;

            if(tipo === 'movie') {
                document.getElementById('btnPeli').classList.remove('hidden');
                document.getElementById('contSeries').classList.add('hidden');
                document.getElementById('btnPeli').onclick = () => lanzar();
            } else {
                document.getElementById('btnPeli').classList.add('hidden');
                document.getElementById('contSeries').classList.remove('hidden');
                renderTemporadas(id, p.number_of_seasons);
            }
            document.getElementById('modalDetalles').classList.remove('hidden');
        }

        async function renderTemporadas(id, n) {
            const div = document.getElementById('listaTemps'); div.innerHTML = "";
            for(let i=1; i<=n; i++) {
                const b = document.createElement('button');
                b.className = "px-4 py-2 bg-zinc-800 rounded-lg text-[10px] font-black shrink-0 hover:bg-red-600 transition";
                b.innerText = `Temp ${i}`;
                b.onclick = () => renderEpisodios(id, i);
                div.appendChild(b);
            }
            renderEpisodios(id, 1);
        }

        async function renderEpisodios(id, s) {
            currentMedia.s = s;
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${API_KEY}&language=es-MX`);
            const data = await res.json();
            const div = document.getElementById('listaEps'); div.innerHTML = "";
            data.episodes.forEach(e => {
                const row = document.createElement('div');
                row.className = "p-3 flex justify-between items-center cursor-pointer hover:bg-white/5 rounded-lg border-b border-white/5 group";
                row.innerHTML = `<span class="text-[11px] font-medium group-hover:text-red-500 transition">${e.episode_number}. ${e.name}</span><i class="fa fa-play text-zinc-700 group-hover:text-red-600 text-[10px]"></i>`;
                row.onclick = () => { currentMedia.e = e.episode_number; lanzar(); };
                div.appendChild(row);
            });
        }

        function lanzar() {
            guardarEnHistorial(currentMedia);
            document.getElementById('player').classList.remove('hidden');
            generarServidores();
            cambiarServidor(1);
        }

        function generarServidores() {
            const container = document.getElementById('selectorServidores'); container.innerHTML = "";
            const servers = [
                { id: 1, name: "Latino 1", icon: "🌎" },
                { id: 2, name: "Latino 2", icon: "🚀" },
                { id: 3, name: "España", icon: "🇪🇸" }
            ];
            servers.forEach(s => {
                const b = document.createElement('button');
                b.id = `srv-${s.id}`;
                b.className = "server-btn";
                b.innerHTML = `<span>${s.icon}</span> <span>${s.name}</span>`;
                b.onclick = () => cambiarServidor(s.id);
                container.appendChild(b);
            });
        }

        function cambiarServidor(num) {
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`srv-${num}`);
            if(activeBtn) activeBtn.classList.add('active');
            
            const { id, tipo, s, e } = currentMedia;
            let url = "";
            
            // LÓGICA DE AUDIO Y ANUNCIOS:
            // Usamos vidsrc.cc con auto_lang=es para forzar latino (Como LG pero con sandbox más estricto)
            if(num === 1) {
                url = tipo === 'movie' ? 
                    `https://vidsrc.cc/v2/embed/movie/${id}?auto_lang=es` : 
                    `https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}?auto_lang=es`;
            } else if(num === 2) {
                url = tipo === 'movie' ? 
                    `https://vidsrc.icu/embed/movie/${id}` : 
                    `https://vidsrc.icu/embed/tv/${id}/${s}/${e}`;
            } else {
                url = tipo === 'movie' ? 
                    `https://vidsrc.pro/embed/movie/${id}` : 
                    `https://vidsrc.pro/embed/tv/${id}/${s}/${e}`;
            }
            
            // Limpiamos el iframe antes de cargar para evitar scripts residuales
            const ifr = document.getElementById('videoIframe');
            ifr.src = "";
            setTimeout(() => { ifr.src = url; }, 100);
        }

        // --- FUNCIONES EXTRA ---
        function toggleKids() {
            isKids = !isKids;
            document.getElementById('mainBody').classList.toggle('kids-active');
            if(isKids) {
                document.getElementById('btnKids').innerText = "ADULTO";
                document.getElementById('btnKids').classList.replace('bg-zinc-800', 'bg-yellow-500');
                cambiarSeccion('discover/movie?with_genres=16,10751', 'Zona Kids');
            } else {
                document.getElementById('btnKids').innerText = "KIDS";
                document.getElementById('btnKids').classList.replace('bg-yellow-500', 'bg-zinc-800');
                cambiarSeccion('trending/all/day', 'Tendencias de Hoy');
            }
        }

        function sorpresa() {
            const cards = document.querySelectorAll('#gridPeliculas .karchy-card');
            if(cards.length > 0) cards[Math.floor(Math.random()*cards.length)].click();
        }

        function cerrarModal() { document.getElementById('modalDetalles').classList.add('hidden'); }
        function cerrarPlayer() { 
            document.getElementById('player').classList.add('hidden'); 
            document.getElementById('videoIframe').src = ""; 
        }

        function toggleMenuPerfiles() {
            const m = document.getElementById('menuPerfiles');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function renderPerfiles() {
            const container = document.getElementById('contenedorPerfiles'); container.innerHTML = "";
            const pers = [{ n: "Karchy", c: "bg-red-600" }, { n: "Niños", c: "bg-yellow-500" }];
            pers.forEach(p => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 p-3 hover:bg-white/5 rounded-xl cursor-pointer transition";
                div.innerHTML = `<div class="avatar ${p.c} text-white">${p.n[0]}</div><span class="text-xs font-bold text-zinc-300">${p.n}</span>`;
                div.onclick = () => { 
                    if(p.n === "Niños" && !isKids) toggleKids(); 
                    if(p.n === "Karchy" && isKids) toggleKids();
                    toggleMenuPerfiles(); 
                };
                container.appendChild(div);
            });
        }

        async function cargarHero() {
            const res = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=es-MX`);
            const data = await res.json();
            const p = data.results[0];
            document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${p.backdrop_path})`;
            document.getElementById('heroTitle').innerText = p.title || p.name;
            document.getElementById('heroDesc').innerText = p.overview;
            document.getElementById('heroYear').innerText = (p.release_date || p.first_air_date || "2026").split('-')[0];
            document.getElementById('heroBtn').onclick = () => abrirDetalles(p.id, p.media_type);
        }

        // Buscador Dinámico
        let timeoutSearch;
        document.getElementById('mainSearch').addEventListener('input', (e) => {
            clearTimeout(timeoutSearch);
            const q = e.target.value;
            timeoutSearch = setTimeout(async () => {
                if(q.length > 2) {
                    const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}&language=es-MX`);
                    const data = await res.json();
                    renderGrid(data.results, false);
                    document.getElementById('sectionTitle').innerText = `Resultados para: ${q}`;
                    window.scrollTo({top: 500, behavior: 'smooth'});
                }
            }, 500);
        });

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1000) {
                if(!isFetching && currentPath !== 'search') { currentPage++; cargarContenido(); }
            }
            const nav = document.getElementById('navbar');
            if(window.scrollY > 50) nav.classList.add('nav-active');
            else nav.classList.remove('nav-active');
        };
    </script>
</body>
</html>
