<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>Karchy Cinema PRO | Vercel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --karchy-red: #e50914; --karchy-dark: #020202; --karchy-blue: #004d7a; }
        body { background: var(--karchy-dark); color: white; font-family: 'Inter', sans-serif; margin:0; overflow-x: hidden; }
        
        /* Animaciones y Efectos */
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .hero-banner { height: 75vh; background-size: cover; background-position: center; display: flex; align-items: center; position: relative; }
        .hero-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--karchy-dark), transparent); }
        
        .karchy-card { cursor: pointer; transition: 0.3s; border-radius: 12px; overflow: hidden; background: #111; aspect-ratio: 2/3; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .karchy-card:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); border-color: var(--karchy-red); }
        
        .search-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 20px; outline: none; color: white; transition: width 0.3s ease; width: 180px; }
        .search-input:focus { width: 250px; border-color: var(--karchy-red); }

        /* Selector de Audio (La Ruedita) */
        .audio-settings-panel {
            background: rgba(10, 10, 10, 0.98);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px; display: none;
            position: absolute; bottom: 90px; right: 20px; z-index: 500; width: 260px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); backdrop-filter: blur(15px);
        }
        .audio-option {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; margin: 4px 0; border-radius: 10px;
            cursor: pointer; font-size: 13px; font-weight: 800; transition: 0.2s;
        }
        .audio-option.active { background: var(--karchy-red); color: white; }
        .gear-btn { font-size: 30px; color: white; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 10px black); }
        .gear-btn:hover { transform: rotate(90deg); color: var(--karchy-red); }

        .kids-active { background: var(--karchy-blue) !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--karchy-red); border-radius: 10px; }
    </style>
</head>
<body id="mainBody">

    <nav id="navbar" class="fixed w-full p-4 lg:px-12 flex justify-between items-center bg-black/80 backdrop-blur-md z-[100] transition-all">
        <div class="flex items-center gap-6">
            <h1 class="text-2xl font-black text-red-600 tracking-tighter cursor-pointer" onclick="location.reload()">KARCHY</h1>
            <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-widest">
                <a href="#" onclick="cargarGrid('trending/all/day', 'Inicio')" class="hover:text-red-500">Inicio</a>
                <a href="#" onclick="cargarGrid('discover/movie', 'Películas')" class="hover:text-red-500">Películas</a>
                <a href="#" onclick="cargarGrid('tv/popular', 'Series')" class="hover:text-red-500">Series</a>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="relative">
                <i class="fa fa-search absolute left-3 top-2.5 text-zinc-500 text-xs"></i>
                <input type="text" id="mainSearch" placeholder="Buscar en Latino..." class="search-input pl-9">
            </div>
            <button onclick="toggleKids()" id="btnKids" class="bg-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black border border-white/10 hover:bg-blue-500 transition">KIDS</button>
            <div class="w-10 h-10 rounded-lg bg-red-600 flex items-center justify-center font-black cursor-pointer border-2 border-white/20">K</div>
        </div>
    </nav>

    <header id="hero" class="hero-banner">
        <div class="relative z-10 px-8 lg:px-20 max-w-4xl pt-20">
            <h1 id="heroTitle" class="text-5xl lg:text-7xl font-black italic uppercase leading-tight mb-4">Cargando...</h1>
            <p id="heroDesc" class="text-zinc-400 text-sm mb-8 line-clamp-3 max-w-xl"></p>
            <button id="heroBtn" class="bg-red-600 px-10 py-3 rounded-md font-black hover:bg-white hover:text-red-600 transition flex items-center gap-3">
                <i class="fa fa-play"></i> VER AHORA
            </button>
        </div>
    </header>

    <main class="p-8 lg:px-20">
        <h2 id="sectionTitle" class="text-xl font-black uppercase tracking-widest mb-10 border-l-4 border-red-600 pl-4">Recomendados</h2>
        <div id="gridPeliculas" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <div id="player" class="fixed inset-0 z-[200] bg-black hidden flex flex-col">
        <div class="p-3 flex justify-between items-center bg-black border-b border-white/10">
            <span class="font-black text-red-600 italic">KARCHY VERCEL PRO</span>
            <button onclick="cerrarPlayer()" class="bg-red-600 text-white px-6 py-1.5 rounded-full text-[10px] font-black">CERRAR</button>
        </div>
        
        <div class="flex-1 bg-black relative">
            <iframe id="videoIframe" src="" class="w-full h-full border-0" allowfullscreen allow="autoplay"></iframe>

            <div class="absolute bottom-10 right-10 z-[300] flex flex-col items-end">
                <div id="audioPanel" class="audio-settings-panel">
                    <h4 class="text-[10px] text-zinc-500 font-black mb-4 uppercase italic">Ajustes de Idioma</h4>
                    <div class="audio-option active" id="opt1" onclick="cambiarMotor(1)">
                        <span>ESPAÑOL LATINO</span><i class="fa fa-check-circle"></i>
                    </div>
                    <div class="audio-option" id="opt2" onclick="cambiarMotor(2)">
                        <span>ESPAÑOL (SERVER 2)</span><i class="fa fa-circle"></i>
                    </div>
                    <div class="audio-option" id="opt3" onclick="cambiarMotor(3)">
                        <span>INGLÉS / ORIGINAL</span><i class="fa fa-globe"></i>
                    </div>
                </div>
                <i class="fa fa-gear gear-btn" onclick="toggleAudioPanel()"></i>
            </div>
        </div>
    </div>

    <div id="modalDetalles" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-4 bg-black/95 backdrop-blur-sm">
        <div class="w-full max-w-5xl max-h-[90vh] rounded-3xl overflow-hidden flex flex-col md:flex-row bg-[#0a0a0a] border border-white/10">
            <div id="modalImg" class="w-full md:w-1/3 bg-cover bg-center min-h-[400px] relative">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent"></div>
            </div>
            <div class="p-8 flex-1 overflow-y-auto custom-scrollbar">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="modalTitle" class="text-4xl font-black italic uppercase text-white mb-2">Título</h2>
                        <span class="bg-green-600/20 text-green-500 text-[10px] font-black px-3 py-1 rounded">DISPONIBLE EN LATINO</span>
                    </div>
                    <button onclick="cerrarModal()" class="text-3xl text-zinc-500 hover:text-white">&times;</button>
                </div>
                
                <p id="modalDesc" class="text-zinc-400 text-sm mb-8"></p>

                <div id="contSeries" class="hidden">
                    <div id="listaTemps" class="flex gap-2 overflow-x-auto mb-6 pb-2 custom-scrollbar"></div>
                    <div id="listaEps" class="space-y-2 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
                <button id="btnPeli" class="bg-red-600 w-full py-5 rounded-2xl font-black hidden hover:scale-[1.02] transition-all">
                    <i class="fa fa-play mr-2"></i> REPRODUCIR PELÍCULA
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'fd07a628a3e0f6b9a4dffb579c306fbf';
        let currentMedia = { id: null, tipo: null, s: 1, e: 1 };
        let isKids = false;

        window.onload = () => { cargarHero(); cargarGrid('trending/all/day', 'Tendencias de Hoy'); };

        async function cargarHero() {
            const res = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=es-MX`);
            const data = await res.json();
            const p = data.results[0];
            document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${p.backdrop_path})`;
            document.getElementById('heroTitle').innerText = p.title || p.name;
            document.getElementById('heroDesc').innerText = p.overview;
            document.getElementById('heroBtn').onclick = () => abrirDetalles(p.id, p.media_type);
        }

        async function cargarGrid(path, label) {
            document.getElementById('sectionTitle').innerText = label;
            const res = await fetch(`https://api.themoviedb.org/3/${path}${path.includes('?') ? '&' : '?'}api_key=${API_KEY}&language=es-MX`);
            const data = await res.json();
            const grid = document.getElementById('gridPeliculas');
            grid.innerHTML = "";
            data.results.forEach(p => {
                if(!p.poster_path) return;
                const card = document.createElement('div');
                card.className = "karchy-card fade-in";
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${p.poster_path}" class="w-full h-full object-cover">`;
                card.onclick = () => abrirDetalles(p.id, p.media_type || (p.first_air_date ? 'tv' : 'movie'));
                grid.appendChild(card);
            });
        }

        async function abrirDetalles(id, tipo) {
            const res = await fetch(`https://api.themoviedb.org/3/${tipo}/${id}?api_key=${API_KEY}&language=es-MX`);
            const p = await res.json();
            currentMedia = { id, tipo, s: 1, e: 1 };
            
            document.getElementById('modalTitle').innerText = p.title || p.name;
            document.getElementById('modalDesc').innerText = p.overview;
            document.getElementById('modalImg').style.backgroundImage = `url(https://image.tmdb.org/t/p/w500${p.poster_path})`;
            
            if(tipo === 'movie') {
                document.getElementById('btnPeli').classList.remove('hidden');
                document.getElementById('contSeries').classList.add('hidden');
                document.getElementById('btnPeli').onclick = () => lanzar();
            } else {
                document.getElementById('btnPeli').classList.add('hidden');
                document.getElementById('contSeries').classList.remove('hidden');
                renderTemps(id, p.number_of_seasons);
            }
            document.getElementById('modalDetalles').classList.remove('hidden');
        }

        function renderTemps(id, n) {
            const div = document.getElementById('listaTemps'); div.innerHTML = "";
            for(let i=1; i<=n; i++) {
                const b = document.createElement('button');
                b.className = "px-6 py-2 bg-[#111] rounded-xl text-[10px] font-black shrink-0 hover:bg-red-600 transition";
                b.innerText = `TEMPORADA ${i}`;
                b.onclick = () => renderEps(id, i);
                div.appendChild(b);
            }
            renderEps(id, 1);
        }

        async function renderEps(id, s) {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${API_KEY}&language=es-MX`);
            const data = await res.json();
            const div = document.getElementById('listaEps'); div.innerHTML = "";
            data.episodes.forEach(e => {
                const row = document.createElement('div');
                row.className = "p-4 flex justify-between items-center cursor-pointer hover:bg-white/5 rounded-xl bg-[#111]";
                row.innerHTML = `<div class="flex flex-col"><span class="text-[10px] text-red-600 font-black">EPISODIO ${e.episode_number}</span><span class="text-xs font-bold">${e.name}</span></div><i class="fa fa-play-circle text-2xl text-red-600"></i>`;
                row.onclick = () => { currentMedia.s = s; currentMedia.e = e.episode_number; lanzar(); };
                div.appendChild(row);
            });
        }

        function lanzar() {
            document.getElementById('player').classList.remove('hidden');
            cambiarMotor(1);
        }

        function cambiarMotor(num) {
            const { id, tipo, s, e } = currentMedia;
            let url = "";
            document.querySelectorAll('.audio-option').forEach(el => el.classList.remove('active'));
            document.getElementById(`opt${num}`).classList.add('active');
            
            if(num === 1) url = `https://vidsrc.cc/v2/embed/${tipo}/${id}${tipo==='tv'?`/${s}/${e}`:''}?auto_lang=es`;
            else if(num === 2) url = `https://vidsrc.xyz/embed/${tipo}?tmdb=${id}${tipo==='tv'?`&sea=${s}&epi=${e}`:''}&lang=es`;
            else url = `https://vidsrc.me/embed/${tipo}?tmdb=${id}${tipo==='tv'?`&sea=${s}&epi=${e}`:''}`;

            document.getElementById('videoIframe').src = url;
            document.getElementById('audioPanel').style.display = 'none';
        }

        function toggleAudioPanel() {
            const p = document.getElementById('audioPanel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function toggleKids() {
            if(isKids) {
                if(prompt("PIN Parental (2818):") === "2818") {
                    isKids = false;
                    document.getElementById('mainBody').classList.remove('kids-active');
                    cargarGrid('trending/all/day', 'Tendencias');
                }
            } else {
                isKids = true;
                document.getElementById('mainBody').classList.add('kids-active');
                cargarGrid('discover/movie?with_genres=16,10751', 'Zona Kids');
            }
        }

        document.getElementById('mainSearch').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') cargarGrid(`search/multi?query=${e.target.value}`, `Resultados: ${e.target.value}`);
        });

        function cerrarModal() { document.getElementById('modalDetalles').classList.add('hidden'); }
        function cerrarPlayer() { document.getElementById('player').classList.add('hidden'); document.getElementById('videoIframe').src = ""; }
    </script>
</body>
</html>
