<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karchy Cinema | Premium Latino</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --karchy-red: #e50914; --karchy-dark: #020202; --karchy-blue: #004d7a; }
        body { background: var(--karchy-dark); color: white; font-family: 'Inter', sans-serif; margin:0; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        
        /* Estilos del Navegador (Mezcla de ambos) */
        nav { background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); backdrop-filter: blur(10px); z-index: 100; transition: all 0.3s; }
        .nav-scrolled { background: rgba(0,0,0,0.95) !important; box-shadow: 0 4px 20px rgba(0,0,0,0.8); height: 70px; }

        .loader-latino { border: 3px solid #f3f3f3; border-top: 3px solid var(--karchy-red); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Carteleras mejoradas */
        .karchy-card { cursor: pointer; transition: 0.3s; border-radius: 12px; overflow: hidden; background: #111; aspect-ratio: 2/3; position: relative; border: 2px solid transparent; }
        .karchy-card:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); border-color: var(--karchy-red); z-index: 10; }
        
        .badge-latino { position: absolute; top: 8px; right: 8px; background: var(--karchy-red); color: white; font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; z-index: 5; }

        /* Panel de Audio */
        .audio-settings-panel { background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; display: none; position: absolute; bottom: 90px; right: 20px; z-index: 300; width: 260px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .audio-option { display: flex; align-items: center; justify-content: space-between; padding: 12px; margin: 4px 0; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 800; transition: 0.2s; border: 1px solid transparent; }
        .audio-option:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
        .audio-option.active { background: var(--karchy-red); color: white; }

        .gear-btn { font-size: 28px; color: white; cursor: pointer; transition: all 0.3s ease; opacity: 0.8; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        .gear-btn:hover { transform: rotate(90deg); opacity: 1; color: var(--karchy-red); }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--karchy-red); border-radius: 10px; }
        
        .kids-active { background: #001a2c !important; }
        .kids-active .badge-latino { background: #00a2ff; }
    </style>
</head>
<body id="mainBody">

    <nav id="navbar" class="fixed w-full p-4 lg:px-12 flex justify-between items-center">
        <div class="flex items-center gap-4 md:gap-6">
            <h1 class="text-xl md:text-2xl font-black text-red-600 tracking-tighter cursor-pointer" onclick="location.reload()">KARCHY</h1>
            <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-widest">
                <a href="#" onclick="cambiarSeccion('trending/all/day', 'Inicio')" class="hover:text-red-500">Inicio</a>
                <a href="#" onclick="cambiarSeccion('discover/movie', 'Películas')">Películas</a>
                <a href="#" onclick="cambiarSeccion('tv/popular', 'Series')">Series</a>
            </div>
        </div>
        
        <div class="flex items-center gap-2 md:gap-4">
            <div class="relative hidden sm:block">
                <i class="fa fa-search absolute left-3 top-2.5 text-zinc-500 text-xs"></i>
                <input type="text" id="mainSearch" placeholder="Buscar..." class="bg-white/10 border border-white/20 pl-9 pr-4 py-2 rounded-full text-xs outline-none focus:w-64 transition-all focus:border-red-600">
            </div>
            <button onclick="toggleKids()" id="btnKids" class="bg-blue-600 px-3 md:px-4 py-1.5 rounded-full text-[9px] md:text-[10px] font-black hover:bg-blue-500 transition">KIDS</button>
            <div onclick="toggleMenuPerfiles()" class="w-10 h-10 rounded-lg bg-red-600 flex items-center justify-center font-black cursor-pointer border-2 border-white/20">K</div>
            
            <div id="menuPerfiles" class="hidden absolute top-20 right-10 bg-[#111] border border-white/10 p-4 rounded-xl shadow-2xl z-[500]">
                <div id="contenedorPerfiles"></div>
            </div>
        </div>
    </nav>

    <header id="hero" class="relative h-[75vh] flex items-center px-8 lg:px-20 overflow-hidden">
        <div id="heroBg" class="absolute inset-0 bg-cover bg-center transition-all duration-1000 opacity-40"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black/50"></div>
        
        <div class="relative z-10 max-w-3xl">
            <div class="flex items-center gap-2 mb-4">
                <span class="bg-red-600 text-[10px] font-black px-2 py-0.5 rounded italic">RECOMENDADO</span>
                <span class="text-zinc-400 text-[10px] font-bold uppercase tracking-widest">Audio Latino 5.1</span>
            </div>
            <h1 id="heroTitle" class="text-5xl lg:text-7xl font-black italic uppercase leading-tight mb-4">...</h1>
            <p id="heroDesc" class="text-zinc-300 text-sm mb-8 line-clamp-3 max-w-xl"></p>
            <button id="heroBtn" class="bg-white text-black px-10 py-3 rounded font-black hover:bg-red-600 hover:text-white transition flex items-center gap-3">
                <i class="fa fa-play"></i> VER AHORA
            </button>
        </div>
    </header>

    <main class="p-8 lg:px-20 -mt-20 relative z-20">
        <h2 id="sectionTitle" class="text-xl font-black uppercase tracking-widest mb-10 border-l-4 border-red-600 pl-4">Tendencias</h2>
        <div id="gridPeliculas" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4"></div>
        
        <div id="loading" class="py-20 text-center hidden">
            <div class="loader-latino"></div>
        </div>
    </main>

    <div id="player" class="fixed inset-0 z-[1000] bg-black hidden flex flex-col">
        <div class="p-4 flex justify-between items-center bg-[#050505] border-b border-white/10">
            <div class="flex items-center gap-4">
                <span class="font-black text-red-600 italic">KARCHY PLAYER</span>
                <span id="playerIndicator" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Sincronizando...</span>
            </div>
            <button onclick="cerrarPlayer()" class="bg-white/10 hover:bg-red-600 text-white px-6 py-2 rounded-full text-[10px] font-black transition">CERRAR</button>
        </div>
        
        <div class="flex-1 relative">
            <iframe id="videoIframe" src="" class="w-full h-full border-0" allowfullscreen allow="autoplay"></iframe>
            
            <div class="absolute bottom-10 right-10 flex flex-col items-end">
                <div id="audioPanel" class="audio-settings-panel">
                    <h4 class="text-[10px] text-red-600 font-black mb-4 uppercase italic">Idioma / Servidor</h4>
                    <div class="audio-option active" id="opt1" onclick="cambiarMotor(1)">
                        <span>ESPAÑOL LATINO (VIP)</span><i class="fa fa-check-circle"></i>
                    </div>
                    <div class="audio-option" id="opt2" onclick="cambiarMotor(2)">
                        <span>ESPAÑOL LATINO 2</span><i class="fa fa-circle"></i>
                    </div>
                    <div class="audio-option" id="opt3" onclick="cambiarMotor(3)">
                        <span>ORIGINAL / SUB</span><i class="fa fa-globe"></i>
                    </div>
                </div>
                <i class="fa fa-gear gear-btn" onclick="toggleAudioPanel()"></i>
            </div>
        </div>
    </div>

    <div id="modalDetalles" class="fixed inset-0 z-[500] hidden flex items-center justify-center p-4 bg-black/95 backdrop-blur-sm">
        <div class="w-full max-w-5xl rounded-3xl overflow-hidden flex flex-col md:row bg-[#0a0a0a] border border-white/10 max-h-[90vh]">
            <div class="flex flex-col md:flex-row w-full overflow-y-auto custom-scrollbar">
                <div id="modalImg" class="w-full md:w-1/3 bg-cover bg-center min-h-[400px]"></div>
                <div class="p-8 flex-1">
                    <div class="flex justify-between items-start mb-4">
                        <h2 id="modalTitle" class="text-4xl font-black italic uppercase">Título</h2>
                        <button onclick="cerrarModal()" class="text-3xl hover:text-red-600">&times;</button>
                    </div>
                    <p id="modalDesc" class="text-zinc-400 text-sm mb-6 leading-relaxed"></p>
                    
                    <div id="contSeries" class="hidden">
                        <div id="listaTemps" class="flex gap-2 overflow-x-auto mb-6 pb-2 custom-scrollbar"></div>
                        <div id="listaEps" class="space-y-2 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar"></div>
                    </div>
                    
                    <button id="btnPeli" class="bg-red-600 w-full py-4 rounded-xl font-black hover:bg-white hover:text-red-600 transition-all hidden">
                        <i class="fa fa-play mr-2"></i> REPRODUCIR AHORA
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'fd07a628a3e0f6b9a4dffb579c306fbf';
        let currentMedia = { id: null, tipo: null, s: 1, e: 1 };
        let isKids = false;

        // --- LÓGICA DE COMPORTAMIENTO (RECUPERADA DEL ORIGINAL) ---
        $(window).scroll(function() {
            if ($(this).scrollTop() > 50) {
                $('#navbar').addClass('nav-scrolled');
            } else {
                $('#navbar').removeClass('nav-scrolled');
            }
        });

        // Función de Cookies Original
        function setCookie(cname, cvalue) {
            var d = new Date();
            d.setTime(d.getTime() + (864000000));
            document.cookie = cname + "=" + cvalue + ";expires=" + d.toUTCString() + ";path=/";
        }

        // Validación de Soporte (Original)
        function MSSupported() {
            const ms = window.MediaSource || window.WebKitMediaSource;
            return !!(ms && ms.isTypeSupported('video/mp4; codecs="avc1.42E01E,mp4a.40.2"'));
        }

        // --- LÓGICA DE API Y REPRODUCCIÓN ---
        window.onload = () => {
            renderPerfiles();
            cargarHero();
            cambiarSeccion('trending/all/day', 'Tendencias de hoy');
        };

        async function cargarHero() {
            const res = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=es-MX`);
            const data = await res.json();
            const p = data.results[Math.floor(Math.random() * 5)];
            document.getElementById('heroBg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${p.backdrop_path})`;
            document.getElementById('heroTitle').innerText = p.title || p.name;
            document.getElementById('heroDesc').innerText = p.overview;
            document.getElementById('heroBtn').onclick = () => abrirDetalles(p.id, p.media_type);
        }

        async function cambiarSeccion(path, label) {
            $("#loading").removeClass('hidden');
            $("#sectionTitle").text(label);
            const res = await fetch(`https://api.themoviedb.org/3/${path}${path.includes('?') ? '&' : '?'}api_key=${API_KEY}&language=es-MX`);
            const data = await res.json();
            renderGrid(data.results);
            $("#loading").addClass('hidden');
        }

        function renderGrid(lista) {
            const grid = document.getElementById('gridPeliculas');
            grid.innerHTML = "";
            lista.forEach(p => {
                if(!p.poster_path) return;
                const card = document.createElement('div');
                card.className = "karchy-card";
                card.innerHTML = `<div class="badge-latino">LATINO</div><img src="https://image.tmdb.org/t/p/w500${p.poster_path}" class="w-full h-full object-cover">`;
                card.onclick = () => abrirDetalles(p.id, p.media_type || (p.first_air_date ? 'tv' : 'movie'));
                grid.appendChild(card);
            });
        }

        async function abrirDetalles(id, tipo) {
            const res = await fetch(`https://api.themoviedb.org/3/${tipo}/${id}?api_key=${API_KEY}&language=es-MX`);
            const p = await res.json();
            currentMedia = { id, tipo, s: 1, e: 1 };
            
            $("#modalTitle").text(p.title || p.name);
            $("#modalDesc").text(p.overview);
            $("#modalImg").css('background-image', `url(https://image.tmdb.org/t/p/w500${p.poster_path})`);
            
            if(tipo === 'movie') {
                $("#btnPeli").removeClass('hidden').off().on('click', () => lanzar(id, 'movie'));
                $("#contSeries").addClass('hidden');
            } else {
                $("#btnPeli").addClass('hidden');
                $("#contSeries").removeClass('hidden');
                renderTemps(id, p.number_of_seasons);
            }
            $("#modalDetalles").removeClass('hidden');
        }

        async function renderTemps(id, n) {
            const div = $("#listaTemps").html("");
            for(let i=1; i<=n; i++) {
                $("<button>").addClass("px-4 py-2 bg-white/5 rounded-lg text-[10px] font-black shrink-0 hover:bg-red-600 transition")
                    .text(`T${i}`).on('click', () => renderEps(id, i)).appendTo(div);
            }
            renderEps(id, 1);
        }

        async function renderEps(id, s) {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${API_KEY}&language=es-MX`);
            const data = await res.json();
            const div = $("#listaEps").html("");
            data.episodes.forEach(e => {
                $("<div>").addClass("p-3 flex justify-between items-center bg-white/5 rounded-xl cursor-pointer hover:bg-red-600/20")
                    .html(`<div><span class="text-[10px] text-red-600 font-black">E${e.episode_number}</span><p class="text-xs font-bold">${e.name}</p></div><i class="fa fa-play-circle text-xl"></i>`)
                    .on('click', () => lanzar(id, 'tv', s, e.episode_number)).appendTo(div);
            });
        }

        function lanzar(id, tipo, s = 1, e = 1) {
            currentMedia = { id, tipo, s, e };
            $("#player").removeClass('hidden');
            cambiarMotor(1);
        }

        function cambiarMotor(num) {
            const { id, tipo, s, e } = currentMedia;
            let url = "";
            $(".audio-option").removeClass('active');
            $(`#opt${num}`).addClass('active');

            if(num === 1) {
                url = tipo === 'movie' ? `https://vidsrc.cc/v2/embed/movie/${id}?lang=es` : `https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}?lang=es`;
                $("#playerIndicator").text("Servidor: Karchy VIP (Latino)");
            } else if(num === 2) {
                url = tipo === 'movie' ? `https://vidsrc.xyz/embed/movie?tmdb=${id}&lang=es` : `https://vidsrc.xyz/embed/tv?tmdb=${id}&sea=${s}&epi=${e}&lang=es`;
                $("#playerIndicator").text("Servidor: Alternativo");
            } else {
                url = tipo === 'movie' ? `https://vidsrc.me/embed/movie?tmdb=${id}` : `https://vidsrc.me/embed/tv?tmdb=${id}&sea=${s}&epi=${e}`;
                $("#playerIndicator").text("Servidor: Original / Global");
            }
            $("#videoIframe").attr('src', url);
            $("#audioPanel").hide();
        }

        function toggleKids() {
            if(!isKids) {
                isKids = true;
                $("#mainBody").addClass('kids-active');
                $("#btnKids").text("SALIR KIDS");
                cambiarSeccion('discover/movie?with_genres=16,10751', 'Zona Infantil (Latino)');
            } else {
                if(prompt("Introduce el PIN Parental:") === "2818") {
                    isKids = false;
                    $("#mainBody").removeClass('kids-active');
                    $("#btnKids").text("KIDS");
                    cambiarSeccion('trending/all/day', 'Tendencias de hoy');
                } else {
                    alert("PIN incorrecto");
                }
            }
        }

        function toggleAudioPanel() { $("#audioPanel").fadeToggle(200); }
        function cerrarModal() { $("#modalDetalles").addClass('hidden'); }
        function cerrarPlayer() { $("#player").addClass('hidden'); $("#videoIframe").attr('src', ''); }
        function toggleMenuPerfiles() { $("#menuPerfiles").fadeToggle(200); }
        
        function renderPerfiles() {
            const pers = [{n: "Karchy", c: "bg-red-600"}, {n: "Kids", c: "bg-blue-500"}];
            pers.forEach(p => {
                $("<div>").addClass("flex items-center gap-3 p-2 hover:bg-white/5 rounded-lg cursor-pointer")
                    .html(`<div class="w-8 h-8 rounded ${p.c}"></div><span class="text-xs font-bold">${p.n}</span>`)
                    .on('click', () => {
                        if(p.n === "Kids" && !isKids) toggleKids();
                        else if(p.n === "Karchy" && isKids) toggleKids();
                        $("#menuPerfiles").hide();
                    }).appendTo("#contenedorPerfiles");
            });
        }

        $("#mainSearch").on('keypress', function(e) {
            if(e.key === 'Enter') cambiarSeccion(`search/multi?query=${$(this).val()}`, `Resultados: ${$(this).val()}`);
        });
    </script>
</body>
</html>
